<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 378" width="100%" height="auto">
  <defs>
    <linearGradient id="cardBorderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0.05" />
    </linearGradient>
    <radialGradient id="cardGlow" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Card Background -->
  <rect width="960" height="378" rx="18" fill="#FAF9F6" />
  <rect width="960" height="378" rx="18" fill="url(#cardGlow)" />
  <rect x="0.5" y="0.5" width="959" height="377" rx="18" fill="none" stroke="url(#cardBorderGrad)" stroke-width="1.5" />

  <!-- Featured label -->
  <g transform="translate(48, 52)">
    <text x="0" y="0" fill="#FF6B00" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" letter-spacing="2">FEATURED SYSTEM</text>
  </g>

  <!-- Decoration dots -->
  <g opacity="0.4" transform="translate(906, 44)">
    <circle cx="0" cy="0" r="3.5" fill="#FF6B00" />
    <circle cx="12" cy="0" r="3.5" fill="#FF6B00" />
  </g>

  <!-- Project Name -->
  <g transform="translate(48, 108)">
    <text x="0" y="0" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="bold">Tvarit</text>
  </g>

  <!-- Description -->
  <g transform="translate(48, 152)">
    
      <text x="0" y="0" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="normal" fill-opacity="0.9">Tvarit is an AI-powered meal kit platform that recommends personalized recipes based on user</text>
    
      <text x="0" y="30" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="normal" fill-opacity="0.9">preferences, dietary goals, allergies, and available ingredients. It provides perfectly portioned</text>
    
      <text x="0" y="60" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="normal" fill-opacity="0.9">ingredient kits, guided cooking instructions, and a seamless online ordering experience.</text>
    
  </g>

  <!-- Tech Badges -->
  <g>
        <g transform="translate(48, 242)">
          <rect width="106" height="38" rx="7" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="53" y="25" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" text-anchor="middle">React 19</text>
        </g>
      
        <g transform="translate(166, 242)">
          <rect width="153.5" height="38" rx="7" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="76.75" y="25" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" text-anchor="middle">Firebase Auth</text>
        </g>
      
        <g transform="translate(331.5, 242)">
          <rect width="172.5" height="38" rx="7" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="86.25" y="25" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" text-anchor="middle">Cloud Firestore</text>
        </g>
      
        <g transform="translate(516, 242)">
          <rect width="172.5" height="38" rx="7" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="86.25" y="25" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" text-anchor="middle">Cloud Functions</text>
        </g>
      
        <g transform="translate(700.5, 242)">
          <rect width="96.5" height="38" rx="7" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="48.25" y="25" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" text-anchor="middle">Node.js</text>
        </g>
      
        <g transform="translate(48, 292)">
          <rect width="144" height="38" rx="7" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="72" y="25" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" text-anchor="middle">Tailwind CSS</text>
        </g>
      
        <g transform="translate(204, 292)">
          <rect width="182" height="38" rx="7" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="91" y="25" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" text-anchor="middle">Leaflet Maps API</text>
        </g>
      
        <g transform="translate(398, 292)">
          <rect width="115.5" height="38" rx="7" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="57.75" y="25" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" text-anchor="middle">AI Engine</text>
        </g>
      </g>
</svg>