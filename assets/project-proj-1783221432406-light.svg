<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 476" width="100%" height="auto">
  <defs>
    <linearGradient id="cardBorderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0.05" />
    </linearGradient>
    <radialGradient id="cardGlow" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Card Background -->
  <rect width="960" height="476" rx="18" fill="#FAF9F6" />
  <rect width="960" height="476" rx="18" fill="url(#cardGlow)" />
  <rect x="0.5" y="0.5" width="959" height="475" rx="18" fill="none" stroke="url(#cardBorderGrad)" stroke-width="1.5" />

  <!-- Featured label -->
  <g transform="translate(48, 52)">
    <text x="0" y="0" fill="#FF6B00" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" letter-spacing="2">FEATURED SYSTEM</text>
  </g>

  <!-- Decoration dots -->
  <g opacity="0.4" transform="translate(906, 44)">
    <circle cx="0" cy="0" r="3.5" fill="#FF6B00" />
    <circle cx="12" cy="0" r="3.5" fill="#FF6B00" />
  </g>

  <!-- Project Name -->
  <g transform="translate(48, 108)">
    <text x="0" y="0" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="bold">Github README Blueprint Designer</text>
  </g>

  <!-- Description -->
  <g transform="translate(48, 152)">
    
      <text x="0" y="0" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="normal" fill-opacity="0.88">GitHub-README-Blueprint-Designer is a React and TypeScript-based web</text>
    
      <text x="0" y="30" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="normal" fill-opacity="0.88">application for designing professional GitHub profile READMEs through an</text>
    
      <text x="0" y="60" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="normal" fill-opacity="0.88">interactive visual editor. It features live Markdown preview, modular</text>
    
      <text x="0" y="90" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="normal" fill-opacity="0.88">component architecture, responsive layouts, GitHub statistics integration,</text>
    
      <text x="0" y="120" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="normal" fill-opacity="0.88">project showcase sections, and automated Markdown generation, enabling</text>
    
      <text x="0" y="150" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="normal" fill-opacity="0.88">developers to build polished GitHub profiles efficiently without manual</text>
    
      <text x="0" y="180" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="normal" fill-opacity="0.88">Markdown editing.</text>
    
  </g>

  <!-- Tech Badges -->
  <g>
        <g transform="translate(48, 390)">
          <rect width="106" height="38" rx="7" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="53" y="25" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" text-anchor="middle">React.js</text>
        </g>
      
        <g transform="translate(166, 390)">
          <rect width="125" height="38" rx="7" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="62.5" y="25" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" text-anchor="middle">TypeScript</text>
        </g>
      
        <g transform="translate(303, 390)">
          <rect width="68" height="38" rx="7" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="34" y="25" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" text-anchor="middle">Vite</text>
        </g>
      
        <g transform="translate(383, 390)">
          <rect width="77.5" height="38" rx="7" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="38.75" y="25" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" text-anchor="middle">HTML5</text>
        </g>
      
        <g transform="translate(472.5, 390)">
          <rect width="68" height="38" rx="7" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.07" stroke-width="1" />
          <text x="34" y="25" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" text-anchor="middle">CSS3</text>
        </g>
      </g>
</svg>