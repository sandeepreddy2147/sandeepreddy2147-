<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" width="100%" height="auto">
  <defs>
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8A00" />
      <stop offset="100%" stop-color="#FF5500" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="80" rx="12" fill="#0D0D11" stroke="#FF6B00" stroke-opacity="0.15" stroke-width="1" />

  <!-- Content Centered -->
  <g transform="translate(400, 40)">
    <!-- Main line -->
    <text x="0" y="-2" fill="#B5B5C0" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="normal" text-anchor="middle">
      Made with <tspan fill="url(#footerGrad)" font-weight="bold">❤</tspan> by Byreddy Venkata sandeep Reddy
    </text>
    
    <!-- Sub line -->
    <text x="0" y="18" fill="#7A7A86" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">
      © 2026 • Apple-Inspired Premium Theme • Validated Responsive Pipeline
    </text>
  </g>
</svg>