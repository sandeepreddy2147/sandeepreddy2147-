<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 570" width="100%" height="auto" style="background-color: #FFFFFF; border-radius: 18px;">
  <defs>
    <!-- Card Inner Glow & Shadows -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.4" />
    </filter>

    <linearGradient id="headerDividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="1" />
      <stop offset="30%" stop-color="#00D2FF" stop-opacity="1" />
      <stop offset="100%" stop-color="#E4E4E7" stop-opacity="0.2" />
    </linearGradient>

    <!-- Glowing Accent Filters -->
    <filter id="glow_cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow_grey" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow_orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow_purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow_deep-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow_green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow_yellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow_red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Badge Circle Gradients -->
    <linearGradient id="grad_pull_shark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A84FF" />
      <stop offset="100%" stop-color="#00D2FF" />
    </linearGradient>
    <linearGradient id="grad_arctic_vault" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#798296" />
      <stop offset="100%" stop-color="#B0C4DE" />
    </linearGradient>
    <linearGradient id="grad_quickdraw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF375F" />
      <stop offset="100%" stop-color="#BF5AF2" />
    </linearGradient>
    <linearGradient id="grad_pair_extra" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BF5AF2" />
      <stop offset="100%" stop-color="#0A84FF" />
    </linearGradient>
    <linearGradient id="grad_galaxy_brain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8E2DE2" />
      <stop offset="100%" stop-color="#4A00E0" />
    </linearGradient>
    <linearGradient id="grad_yolo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF9F0A" />
      <stop offset="100%" stop-color="#FF375F" />
    </linearGradient>
    <linearGradient id="grad_green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#30D158" />
      <stop offset="100%" stop-color="#15B53B" />
    </linearGradient>
    <linearGradient id="grad_yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD60A" />
      <stop offset="100%" stop-color="#FF9F0A" />
    </linearGradient>
  </defs>

  <!-- Main Canvas Background -->
  <rect width="1600" height="570" rx="18" fill="#FFFFFF" stroke="#E4E4E7" stroke-width="1.5" />

  <!-- HEADER SECTION (🏆 Accolades & Achievements) -->
  <g transform="translate(60, 50)">
    <!-- Trophy Icon Vector -->
    <g transform="translate(0, 5)">
      <circle cx="24" cy="24" r="24" fill="#FF9F1A" fill-opacity="0.15" />
      <!-- Trophy Outline -->
      <path d="M24 10c-4.4 0-8 3.6-8 8 0 3.3 2 6.1 4.9 7.3l.1.1v4.6h-3c-.6 0-1 .4-1 1s.4 1 1 1h8c.6 0 1-.4 1-1s-.4-1-1-1h-3v-4.6c2.9-1.2 5-4 5-7.4 0-4.4-3.6-8-8-8zm-4.1 6.5c-.5-1-1.2-1.8-2.1-2.4l-.4-.2v5.2c1.3-.2 2.1-1.2 2.5-2.6zm8.2 0c.4 1.4 1.2 2.4 2.5 2.6v-5.2l-.4.2c-.9.6-1.6 1.4-2.1 2.4z" fill="#FF9F1A" transform="scale(1.2) translate(-4, -4)" />
    </g>
    <!-- Title and Subtitle -->
    <text x="75" y="28" fill="#18181B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="28" font-weight="800" letter-spacing="-0.5px">Accolades &amp; Achievements</text>
    <text x="75" y="53" fill="#71717A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="14" font-weight="500">Premium tracking dashboard of professional milestones, contributions, and platform-wide accolades.</text>
    <!-- Underline divider -->
    <line x1="0" y1="75" x2="1480" y2="75" stroke="url(#headerDividerGrad)" stroke-width="1.5" />
  </g>

  <!-- TOP ROW BADGES (Glassmorphism rounded badge pills with macOS style accent dots) -->
  <g transform="translate(60, 155)">
    <!-- Badge 1: Open Source -->
    <g transform="translate(0, 0)">
      <rect width="165" height="42" rx="21" fill="#F4F4F5" fill-opacity="1.0" stroke="#00D2FF" stroke-opacity="0.3" stroke-width="1.2" />
      <circle cx="22" cy="21" r="5" fill="#00D2FF" filter="url(#glow_cyan)" />
      <text x="38" y="26" fill="#18181B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.1px">Open Source</text>
    </g>
    <!-- Badge 2: Contributor -->
    <g transform="translate(188, 0)">
      <rect width="165" height="42" rx="21" fill="#F4F4F5" fill-opacity="1.0" stroke="#FF6B00" stroke-opacity="0.3" stroke-width="1.2" />
      <circle cx="22" cy="21" r="5" fill="#FF6B00" filter="url(#glow_orange)" />
      <text x="38" y="26" fill="#18181B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.1px">Contributor</text>
    </g>
    <!-- Badge 3: Full Stack -->
    <g transform="translate(376, 0)">
      <rect width="165" height="42" rx="21" fill="#F4F4F5" fill-opacity="1.0" stroke="#BF5AF2" stroke-opacity="0.3" stroke-width="1.2" />
      <circle cx="22" cy="21" r="5" fill="#BF5AF2" filter="url(#glow_purple)" />
      <text x="38" y="26" fill="#18181B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.1px">Full Stack</text>
    </g>
    <!-- Badge 4: Developer -->
    <g transform="translate(564, 0)">
      <rect width="165" height="42" rx="21" fill="#F4F4F5" fill-opacity="1.0" stroke="#30D158" stroke-opacity="0.3" stroke-width="1.2" />
      <circle cx="22" cy="21" r="5" fill="#30D158" filter="url(#glow_green)" />
      <text x="38" y="26" fill="#18181B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.1px">Developer</text>
    </g>
    <!-- Badge 5: LeetCode -->
    <g transform="translate(752, 0)">
      <rect width="165" height="42" rx="21" fill="#F4F4F5" fill-opacity="1.0" stroke="#FFA116" stroke-opacity="0.3" stroke-width="1.2" />
      <circle cx="22" cy="21" r="5" fill="#FFA116" filter="url(#glow_orange)" />
      <text x="38" y="26" fill="#18181B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.1px">Algorithms</text>
    </g>
    <!-- Badge 6: Expert -->
    <g transform="translate(940, 0)">
      <rect width="165" height="42" rx="21" fill="#F4F4F5" fill-opacity="1.0" stroke="#FFD60A" stroke-opacity="0.3" stroke-width="1.2" />
      <circle cx="22" cy="21" r="5" fill="#FFD60A" filter="url(#glow_yellow)" />
      <text x="38" y="26" fill="#18181B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.1px">Expert Code</text>
    </g>
    <!-- Badge 7: Competitive -->
    <g transform="translate(1128, 0)">
      <rect width="165" height="42" rx="21" fill="#F4F4F5" fill-opacity="1.0" stroke="#E53E3E" stroke-opacity="0.3" stroke-width="1.2" />
      <circle cx="22" cy="21" r="5" fill="#E53E3E" filter="url(#glow_red)" />
      <text x="38" y="26" fill="#18181B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.1px">Competitive</text>
    </g>
    <!-- Badge 8: Cloud -->
    <g transform="translate(1316, 0)">
      <rect width="164" height="42" rx="21" fill="#F4F4F5" fill-opacity="1.0" stroke="#FF375F" stroke-opacity="0.3" stroke-width="1.2" />
      <circle cx="22" cy="21" r="5" fill="#FF375F" filter="url(#glow_red)" />
      <text x="38" y="26" fill="#18181B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="-0.1px">Cloud Native</text>
    </g>
  </g>

  <!-- DYNAMIC ACHIEVEMENTS CONTAINER CARD -->
  <g transform="translate(60, 230)">
    <!-- Glass Card Container -->
    <rect width="1480" height="240" rx="24" fill="#FAF9F6" fill-opacity="1.0" stroke="#E4E4E7" stroke-width="1.5" filter="url(#shadow)" />
    <!-- Card Title -->
    <text x="40" y="42" fill="#18181B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="19" font-weight="800" letter-spacing="-0.3px">🏅 Verified Milestones &amp; Accolades</text>
    <line x1="40" y1="58" x2="1440" y2="58" stroke="#E4E4E7" stroke-width="1.2" />

    <!-- Badges Grid Row-by-Row -->
    
    <g transform="translate(40, 85)">
      <!-- Item Background -->
      <rect width="440" height="110" rx="18" fill="#F4F4F5" fill-opacity="1.0" stroke="#E4E4E7" stroke-width="1.2" />
      
      <!-- Glossy Circle Accent -->
      <circle cx="55" cy="55" r="32" fill="url(#grad_pull_shark)" opacity="0.95" filter="url(#glow_cyan)" />
      <path d="M42 63 C45 47, 60 41, 66 46 C56 50, 52 57, 52 63 Z" fill="#FFFFFF" />
      
      <!-- Text Description -->
      <text x="105" y="47" fill="#18181B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="14.5" font-weight="700">Pull Shark</text>
      <text x="105" y="67" fill="#71717A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="11.5" font-weight="500">PRs Merged</text>
      
      <g transform="translate(365, 45)">
        <rect width="50" height="20" rx="10" fill="#FF375F" />
        <text x="25" y="13" fill="#FFFFFF" font-family="-apple-system, sans-serif" font-size="9.5" font-weight="900" text-anchor="middle">x2</text>
      </g>
    
    </g>
    

    <g transform="translate(520, 85)">
      <!-- Item Background -->
      <rect width="440" height="110" rx="18" fill="#F4F4F5" fill-opacity="1.0" stroke="#E4E4E7" stroke-width="1.2" />
      
      <!-- Glossy Circle Accent -->
      <circle cx="55" cy="55" r="32" fill="url(#grad_yolo)" opacity="0.95" filter="url(#glow_orange)" />
      
        <g transform="translate(40, 40)" fill="#FFA116">
          <path d="M12 0 L2.4 9.6 C0.86 11.14 0.86 13.66 2.4 15.2 L14.4 27.2 C15.94 28.74 18.46 28.74 20 27.2 L29.6 17.6 L12 0 Z" opacity="0.8" />
          <path d="M29.6 17.6 L20 27.2 C18.46 28.74 15.94 28.74 14.4 27.2 L2.4 15.2 C0.86 13.66 0.86 11.14 2.4 9.6 L12 0 L15.6 3.6 L6 13.2 L16.8 24 C17.34 24.54 18.26 24.54 18.8 24 L26.4 16.4 L29.6 17.6 Z" />
        </g>
      
      
      <!-- Text Description -->
      <text x="105" y="47" fill="#18181B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="14.5" font-weight="700">LeetCode Daily</text>
      <text x="105" y="67" fill="#71717A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="11.5" font-weight="500">Days Solved</text>
      
      <g transform="translate(365, 45)">
        <rect width="50" height="20" rx="10" fill="#FF375F" />
        <text x="25" y="13" fill="#FFFFFF" font-family="-apple-system, sans-serif" font-size="9.5" font-weight="900" text-anchor="middle">100+</text>
      </g>
    
    </g>
    
  </g>

  <!-- BOTTOM FOOTER -->
  <g transform="translate(800, 525)">
    <text fill="#71717A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="12.5" font-weight="600" text-anchor="middle" letter-spacing="0.2px">Building exceptional software one milestone at a time.</text>
    <text y="18" fill="#A1A1AA" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="9.5" font-weight="500" text-anchor="middle">© 2026 • Apple Human Interface Design Blueprint • Fully Dynamic Accolades Registry</text>
  </g>
</svg>