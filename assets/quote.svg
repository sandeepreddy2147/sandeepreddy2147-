<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="auto">
  <!-- Defs -->
  <defs>
    <linearGradient id="quoteGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8A00" />
      <stop offset="100%" stop-color="#FF5500" />
    </linearGradient>
    <radialGradient id="quoteGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#0D0D11" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="240" rx="12" fill="#0D0D11" stroke="#FF6B00" stroke-opacity="0.15" stroke-width="1" />
  <circle cx="100" cy="120" r="180" fill="url(#quoteGlow)" />

  <!-- Grid overlay -->
  <g opacity="0.015">
    <path d="M0,30 L800,30 M0,60 L800,60 M0,90 L800,90 M0,120 L800,120 M0,150 L800,150 M0,180 L800,180 M0,210 L800,210" stroke="#FFFFFF" stroke-width="1" />
    <path d="M100,0 L100,240 M200,0 L200,240 M300,0 L300,240 M400,0 L400,240 M500,0 L500,240 M600,0 L600,240 M700,0 L700,240" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Giant elegant Quote mark on left -->
  <text x="50" y="90" fill="url(#quoteGradient)" fill-opacity="0.15" font-family="Georgia, serif" font-size="120" font-weight="bold">“</text>

  <!-- Quote Lines (Centered vertically based on count) -->
  <g transform="translate(110, 60)">
    
      <text x="0" y="0" fill="#F1F1F3" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="normal" font-style="italic">
        Simplicity is the ultimate sophistication. Craft is not
      </text>
    
      <text x="0" y="28" fill="#F1F1F3" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="normal" font-style="italic">
        about adding features, but about refining detail until
      </text>
    
      <text x="0" y="56" fill="#F1F1F3" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="normal" font-style="italic">
        every element serves a singular purpose.
      </text>
    
  </g>

  <!-- Quote mark on right, near end of lines -->
  <text x="710" y="180" fill="url(#quoteGradient)" fill-opacity="0.15" font-family="Georgia, serif" font-size="120" font-weight="bold" text-anchor="end">”</text>

  <!-- Author Info -->
  <g transform="translate(110, 185)">
    <!-- Tiny orange line -->
    <rect x="0" y="5" width="20" height="2" rx="1" fill="url(#quoteGradient)" />
    <text x="30" y="11" fill="#FF6B00" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" letter-spacing="1.5">ALEX MERCER</text>
    <text x="30" y="27" fill="#7A7A86" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold">Full Stack Engineer &amp; Architect</text>
  </g>
</svg>