<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 302" width="100%" height="auto">
  <!-- Defs for Gradient Border and Shadow -->
  <defs>
    <linearGradient id="cardBorderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0.05" />
    </linearGradient>
    <radialGradient id="cardGlow" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Card Background -->
  <rect width="600" height="302" rx="14" fill="#FAF9F6" />
  <rect width="600" height="302" rx="14" fill="url(#cardGlow)" />
  
  <!-- Sleek Glowing Orange/Gray Border -->
  <rect x="0.5" y="0.5" width="599" height="301" rx="14" fill="none" stroke="url(#cardBorderGrad)" stroke-width="1" />

  <!-- Top featured label -->
  <g transform="translate(28, 36)">
    <text x="0" y="0" fill="#FF6B00" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" letter-spacing="1.5">FEATURED SYSTEM</text>
  </g>

  <!-- Card Decoration Dots (Top Right) -->
  <g opacity="0.4" transform="translate(556, 28)">
    <circle cx="0" cy="0" r="2" fill="#FF6B00" />
    <circle cx="8" cy="0" r="2" fill="#FF6B00" />
  </g>

  <!-- Project Name -->
  <g transform="translate(28, 70)">
    <text x="0" y="0" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold">Hotbers - PG Management SaaS Platform</text>
  </g>

  <!-- Description Text (Dynamic Wrap) -->
  <g transform="translate(28, 100)">
    
      <text x="0" y="0" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="normal" fill-opacity="0.85">
        A complete, production-grade cloud SaaS built to help paying
      </text>
    
      <text x="0" y="20" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="normal" fill-opacity="0.85">
        guest owners streamline customer onboarding, room assignments,
      </text>
    
      <text x="0" y="40" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="normal" fill-opacity="0.85">
        auto-invoicing, bookings, payments, and live complaints
      </text>
    
      <text x="0" y="60" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="normal" fill-opacity="0.85">
        management. Integrates complex dashboards for both owners and
      </text>
    
      <text x="0" y="80" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="normal" fill-opacity="0.85">
        renters.
      </text>
    
  </g>

  <!-- Rendered Tech Badges -->
  <g>
    
        <g transform="translate(24, 214)">
          <rect width="72.4" height="26" rx="5" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.06" stroke-width="1" />
          <text x="36.2" y="17" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" text-anchor="middle">React 19</text>
        </g>
      
        <g transform="translate(104.4, 214)">
          <rect width="106.39999999999999" height="26" rx="5" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.06" stroke-width="1" />
          <text x="53.199999999999996" y="17" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Firebase Auth</text>
        </g>
      
        <g transform="translate(218.8, 214)">
          <rect width="120" height="26" rx="5" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.06" stroke-width="1" />
          <text x="60" y="17" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Cloud Firestore</text>
        </g>
      
        <g transform="translate(346.8, 214)">
          <rect width="120" height="26" rx="5" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.06" stroke-width="1" />
          <text x="60" y="17" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Cloud Functions</text>
        </g>
      
        <g transform="translate(474.8, 214)">
          <rect width="65.6" height="26" rx="5" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.06" stroke-width="1" />
          <text x="32.8" y="17" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Node.js</text>
        </g>
      
        <g transform="translate(24, 248)">
          <rect width="99.6" height="26" rx="5" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.06" stroke-width="1" />
          <text x="49.8" y="17" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Tailwind CSS</text>
        </g>
      
        <g transform="translate(131.6, 248)">
          <rect width="126.8" height="26" rx="5" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.06" stroke-width="1" />
          <text x="63.4" y="17" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Leaflet Maps API</text>
        </g>
      
        <g transform="translate(266.4, 248)">
          <rect width="79.19999999999999" height="26" rx="5" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.06" stroke-width="1" />
          <text x="39.599999999999994" y="17" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" text-anchor="middle">AI Engine</text>
        </g>
      
  </g>
</svg>