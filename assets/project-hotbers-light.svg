<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="auto">
  <!-- Defs for Gradient Border and Shadow -->
  <defs>
    <linearGradient id="cardBorderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0.05" />
    </linearGradient>
    <radialGradient id="cardGlow" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Card Background -->
  <rect width="400" height="250" rx="12" fill="#FAF9F6" />
  <rect width="400" height="250" rx="12" fill="url(#cardGlow)" />
  
  <!-- Sleek Glowing Orange/Gray Border -->
  <rect x="0.5" y="0.5" width="399" height="249" rx="12" fill="none" stroke="url(#cardBorderGrad)" stroke-width="1" />

  <!-- Top featured label -->
  <g transform="translate(24, 32)">
    <text x="0" y="0" fill="#FF6B00" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold" letter-spacing="1.5">FEATURED SYSTEM</text>
  </g>

  <!-- Card Decoration Dots (Top Right) -->
  <g opacity="0.4" transform="translate(356, 24)">
    <circle cx="0" cy="0" r="1.5" fill="#FF6B00" />
    <circle cx="6" cy="0" r="1.5" fill="#FF6B00" />
  </g>

  <!-- Project Name -->
  <g transform="translate(24, 60)">
    <text x="0" y="0" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">HOTBERS</text>
  </g>

  <!-- Description Text (Dynamic Wrap) -->
  <g transform="translate(24, 84)">
    
      <text x="0" y="0" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="normal" fill-opacity="0.85">
        A complete, production-grade cloud SaaS built to
      </text>
    
      <text x="0" y="18" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="normal" fill-opacity="0.85">
        help paying guest owners streamline customer
      </text>
    
      <text x="0" y="36" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="normal" fill-opacity="0.85">
        onboarding, room assignments, auto-invoicing,
      </text>
    
      <text x="0" y="54" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="normal" fill-opacity="0.85">
        bookings, payments, and live complaints
      </text>
    
      <text x="0" y="72" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="normal" fill-opacity="0.85">
        management. Integrates complex dashboards for
      </text>
    
      <text x="0" y="90" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="normal" fill-opacity="0.85">
        both owners and renters.
      </text>
    
  </g>

  <!-- Rendered Tech Badges -->
  <g>
    
        <g transform="translate(24, 204)">
          <rect width="45" height="22" rx="4" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.06" stroke-width="1" />
          <text x="22.5" y="14" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" text-anchor="middle">React</text>
        </g>
      
        <g transform="translate(75, 204)">
          <rect width="63.6" height="22" rx="4" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.06" stroke-width="1" />
          <text x="31.8" y="14" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Firebase</text>
        </g>
      
        <g transform="translate(144.6, 204)">
          <rect width="57.4" height="22" rx="4" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.06" stroke-width="1" />
          <text x="28.7" y="14" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Node.js</text>
        </g>
      
        <g transform="translate(208, 204)">
          <rect width="88.4" height="22" rx="4" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.06" stroke-width="1" />
          <text x="44.2" y="14" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Tailwind CSS</text>
        </g>
      
        <g transform="translate(302.4, 204)">
          <rect width="38.8" height="22" rx="4" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.06" stroke-width="1" />
          <text x="19.4" y="14" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Vite</text>
        </g>
      
  </g>
</svg>