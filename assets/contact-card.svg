    <circle cx="30" cy="34" r="3" fill="#FF6B00" />
    <text x="60" y="38" fill="#FF6B00" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" letter-spacing="1">LOCATED IN</text>
    <text x="60" y="56" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="bold">Gudivada, Andhra Pradesh,...</text>
  </g>

