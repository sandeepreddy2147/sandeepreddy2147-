<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="100%" height="auto">
  <defs>
    <!-- Soft orange ambient light -->
    <radialGradient id="orangeGlow" cx="85%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.22" />
      <stop offset="60%" stop-color="#FF6B00" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#FAF9F6" stop-opacity="0" />
    </radialGradient>
    <!-- Orange accent gradient -->
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8A00" />
      <stop offset="100%" stop-color="#FF5500" />
    </linearGradient>
    <!-- Laptop screen background gradient -->
    <linearGradient id="laptopScreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1E24" />
      <stop offset="100%" stop-color="#121215" />
    </linearGradient>
  </defs>
 
  <!-- Ambient background -->
  <rect width="1280" height="420" fill="#FAF9F6" />
  <rect width="1280" height="420" fill="url(#orangeGlow)" />
 
  <!-- Subtle grid pattern overlay -->
  <g opacity="0.05">
    <path d="M 0,42 L 1280,42 M 0,84 L 1280,84 M 0,126 L 1280,126 M 0,168 L 1280,168 M 0,210 L 1280,210 M 0,252 L 1280,252 M 0,294 L 1280,294 M 0,336 L 1280,336 M 0,378 L 1280,378 M 0,420 L 1280,420 M 0,462 L 1280,462 M 0,504 L 1280,504" stroke="#000000" stroke-width="1" />
    <path d="M 128,0 L 128,420 M 256,0 L 256,420 M 384,0 L 384,420 M 512,0 L 512,420 M 640,0 L 640,420 M 768,0 L 768,420 M 896,0 L 896,420 M 1024,0 L 1024,420 M 1152,0 L 1152,420" stroke="#000000" stroke-width="1" />
  </g>
 
  <!-- Left Side Content Group -->
  <g transform="translate(80, 50)">
    <!-- Decorative vertical line — grows with content -->
    <rect x="-24" y="20" width="4" height="319" rx="2" fill="url(#orangeGradient)" />
 
    <!-- Tag/Status Badge -->
    <g transform="translate(0, 20)">
      <rect width="180" height="30" rx="15" fill="#FFFFFF" stroke="#FF6B00" stroke-opacity="0.2" stroke-width="1" />
      <circle cx="20" cy="15" r="7" fill="#FF6B00" fill-opacity="0.2" />
      <circle cx="20" cy="15" r="4" fill="#FF6B00" />
      <text x="36" y="19" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" letter-spacing="1">AVAILABLE FOR ROLE</text>
    </g>
 
    <!-- Headline (Name) - Protected against horizontal overflow with textLength if long -->
    <text x="0" y="110" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900" letter-spacing="-1" textLength="580" lengthAdjust="spacingAndGlyphs">Byreddy Venkata Sandeep Reddy</text>
     
    <!-- Title - Protected against horizontal overflow with textLength if long -->
    <text x="0" y="145" fill="url(#orangeGradient)" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" letter-spacing="1.5" textLength="580" lengthAdjust="spacingAndGlyphs">FULL STACK DEVELOPER | SAAS BUILDER | AI SPECIALIST</text>
 
    <!-- Bio Statement -->
    <text x="0" y="181" fill="#52525B" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="normal">
      <tspan x="0" dy="0">Full-stack engineer specializing in scalable SaaS</tspan>
      <tspan x="0" dy="22">architectures, high-performance databases, and</tspan>
      <tspan x="0" dy="22">production-ready AI integrations. I build secure,</tspan>
      <tspan x="0" dy="22">maintainable systems that translate complex business</tspan>
      <tspan x="0" dy="22">logic into clean, responsive user experiences.</tspan>
    </text>

    <!-- Spec Badges with Vector Icons -->
    <g transform="translate(0, 311)">
      
      <!-- Badge 1 -->
      <g transform="translate(0, 0)">
        <rect width="125" height="28" rx="6" fill="#FFFFFF" stroke="#FF6B00" stroke-opacity="0.12" stroke-width="1" />
        <circle cx="18" cy="14" r="5" fill="#FF6B00" fill-opacity="0.25" />
        <circle cx="18" cy="14" r="3" fill="#FF6B00" />
        <text x="63" y="18" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">High Speed</text>
      </g>
      
      <!-- Badge 2 -->
      <g transform="translate(135, 0)">
        <rect width="125" height="28" rx="6" fill="#FFFFFF" stroke="#FF6B00" stroke-opacity="0.12" stroke-width="1" />
        <circle cx="18" cy="14" r="5" fill="#FF6B00" fill-opacity="0.25" />
        <circle cx="18" cy="14" r="3" fill="#FF6B00" />
        <text x="63" y="18" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">AI-Ready</text>
      </g>
      
      <!-- Badge 3 -->
      <g transform="translate(270, 0)">
        <rect width="125" height="28" rx="6" fill="#FFFFFF" stroke="#FF6B00" stroke-opacity="0.12" stroke-width="1" />
        <circle cx="18" cy="14" r="5" fill="#FF6B00" fill-opacity="0.25" />
        <circle cx="18" cy="14" r="3" fill="#FF6B00" />
        <text x="63" y="18" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">SaaS Focus</text>
      </g>
    </g>
  </g>

  <!-- Right Side: Apple Macbook & Coding Mockup -->
  <g transform="translate(730, 45)">
    <!-- Flat Shadow simulation -->
    <rect x="52" y="22" width="410" height="265" rx="16" fill="#000000" fill-opacity="0.4" />
    
    <!-- Macbook Screen Outer Frame -->
    <rect x="50" y="20" width="410" height="265" rx="16" fill="#15151C" stroke="#FF6B00" stroke-opacity="0.15" stroke-width="2" />
    
    <!-- Macbook Screen Display Area -->
    <rect x="58" y="28" width="394" height="249" rx="10" fill="url(#laptopScreen)" />

    <!-- Screen Header dots -->
    <circle cx="75" cy="45" r="5" fill="#FF5F56" />
    <circle cx="90" cy="45" r="5" fill="#FFBD2E" />
    <circle cx="105" cy="45" r="5" fill="#27C93F" />
    <text x="255" y="49" fill="#7A7A86" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">app.ts</text>

    <!-- Code Editor Content -->
    <g transform="translate(75, 75)">
      <!-- const developer = { -->
      <text x="0" y="0" font-family="Courier, monospace" font-size="12" font-weight="bold" fill="#FFFFFF">
        <tspan fill="#FF5500">const</tspan> <tspan fill="#FF8A00">developer</tspan> = {
      </text>
      <!-- name -->
      <text x="15" y="20" font-family="Courier, monospace" font-size="12" font-weight="bold" fill="#FFFFFF">
        <tspan fill="#B5B5C0">name:</tspan> <tspan fill="#FF8A00">"Byreddy"</tspan>,
      </text>
      <!-- role -->
      <text x="15" y="40" font-family="Courier, monospace" font-size="12" font-weight="bold" fill="#FFFFFF">
        <tspan fill="#B5B5C0">role:</tspan> <tspan fill="#FF8A00">"Full-Stack"</tspan>,
      </text>
      <!-- crafts -->
      <text x="15" y="60" font-family="Courier, monospace" font-size="12" font-weight="bold" fill="#FFFFFF">
        <tspan fill="#B5B5C0">crafts:</tspan> [<tspan fill="#FF8A00">"SaaS"</tspan>, <tspan fill="#FF8A00">"AI"</tspan>],
      </text>
      <!-- stack -->
      <text x="15" y="80" font-family="Courier, monospace" font-size="12" font-weight="bold" fill="#FFFFFF">
        <tspan fill="#B5B5C0">stack:</tspan> [<tspan fill="#FF8A00">"React"</tspan>, <tspan fill="#FF8A00">"Node"</tspan>]
      </text>
      <text x="0" y="100" font-family="Courier, monospace" font-size="12" font-weight="bold" fill="#FFFFFF">};</text>

      <!-- Comment line -->
      <text x="0" y="130" fill="#7A7A86" font-family="Courier, monospace" font-size="11" font-style="italic">// Ready to ship elegant code...</text>

      <!-- Dynamic accent geometry -->
      <path d="M 230 10 L 290 10 L 260 70 Z" fill="#FF6B00" fill-opacity="0.1" />
    </g>

    <!-- Glossy reflection overlay -->
    <path d="M 58 28 L 300 28 L 58 270 Z" fill="#FFFFFF" fill-opacity="0.02" />

    <!-- Keyboard base baseplate -->
    <path d="M 12 284 L 498 284 C 504 284, 508 288, 507 294 L 498 310 C 496 313, 492 315, 486 315 L 24 315 C 18 315, 14 313, 12 310 L 3 294 C 2 288, 6 284, 12 284 Z" fill="#15151C" stroke="#FF6B00" stroke-opacity="0.15" stroke-width="1.5" />
    <path d="M 215 284 L 295 284 L 290 287 L 220 287 Z" fill="#0D0D11" />
    <rect x="230" y="284" width="50" height="4" rx="2" fill="#0D0D11" />
  </g>

  <!-- Floating Tech Badges -->
  <!-- TS Badge -->
  <g transform="translate(710, 290)">
    <circle cx="29" cy="29" r="28" fill="#000000" fill-opacity="0.08" />
    <circle cx="28" cy="28" r="28" fill="#FFFFFF" stroke="#3178C6" stroke-width="1.5" />
    <rect x="15" y="15" width="26" height="26" rx="3" fill="#3178C6" />
    <text x="21" y="33" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold">T</text>
    <text x="31" y="33" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold">S</text>
  </g>

  <!-- React Badge -->
  <g transform="translate(670, 100)">
    <circle cx="29" cy="29" r="28" fill="#000000" fill-opacity="0.08" />
    <circle cx="28" cy="28" r="28" fill="#FFFFFF" stroke="#61DAFB" stroke-width="1.5" />
    <ellipse cx="28" cy="28" rx="8" ry="18" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(30 28 28)" />
    <ellipse cx="28" cy="28" rx="8" ry="18" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(90 28 28)" />
    <ellipse cx="28" cy="28" rx="8" ry="18" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(150 28 28)" />
    <circle cx="28" cy="28" r="3" fill="#61DAFB" />
  </g>

  <!-- Firebase Badge -->
  <g transform="translate(1140, 70)">
    <circle cx="29" cy="29" r="28" fill="#000000" fill-opacity="0.08" />
    <circle cx="28" cy="28" r="28" fill="#FFFFFF" stroke="#FFCA28" stroke-width="1.5" />
    <path d="M19 38l1-2 8-15 3-5 a 1 1 0 0 1 1 0 l 3 5 1 2 1 2z" fill="#FFCA28" />
    <path d="M19 38l1-2 15-8 1-1 a 1 1 0 0 0 0-1 l-3-6 a 1 1 0 0 0 -1 0z" fill="#F57C00" />
    <path d="M19 38l17-10 -1-1 a 1 1 0 0 0 -1-1 H19z" fill="#FFA000" fill-opacity="0.8" />
  </g>

  <!-- Node Badge -->
  <g transform="translate(1190, 240)">
    <circle cx="29" cy="29" r="28" fill="#000000" fill-opacity="0.08" />
    <circle cx="28" cy="28" r="28" fill="#FFFFFF" stroke="#339933" stroke-width="1.5" />
    <path d="M18 20 l 10 -6 l 10 6 v 12 l -10 6 l -10 -6 z" fill="none" stroke="#339933" stroke-width="2" />
    <path d="M28 14 v 20 M18 20 l 10 6 l 10 -6" fill="none" stroke="#339933" stroke-width="1.5" />
  </g>
</svg>