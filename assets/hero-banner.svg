<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="100%" height="auto" style="background: #0D0D11; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255, 107, 0, 0.15);">
  <!-- Background Elements -->
  <defs>
    <!-- Soft orange ambient light -->
    <radialGradient id="orangeGlow" cx="85%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.22" />
      <stop offset="60%" stop-color="#FF6B00" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#0D0D11" stop-opacity="0" />
    </radialGradient>
    <!-- Dark glass-like card on left -->
    <linearGradient id="glassCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A22" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#121218" stop-opacity="0.95" />
    </linearGradient>
    <!-- Orange accent gradient -->
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8A00" />
      <stop offset="100%" stop-color="#FF5500" />
    </linearGradient>
    <linearGradient id="laptopScreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1E24" />
      <stop offset="100%" stop-color="#121215" />
    </linearGradient>
    <!-- Drop shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>
    <filter id="orangeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FF6B00" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Ambient Glow -->
  <rect width="1280" height="420" fill="#0D0D11" />
  <rect width="1280" height="420" fill="url(#orangeGlow)" />

  <!-- Subtle grid pattern overlay -->
  <g opacity="0.03">
    <path d="M 0,42 L 1280,42 M 0,84 L 1280,84 M 0,126 L 1280,126 M 0,168 L 1280,168 M 0,210 L 1280,210 M 0,252 L 1280,252 M 0,294 L 1280,294 M 0,336 L 1280,336 M 0,378 L 1280,378" stroke="#FFFFFF" stroke-width="1" />
    <path d="M 128,0 L 128,420 M 256,0 L 256,420 M 384,0 L 384,420 M 512,0 L 512,420 M 640,0 L 640,420 M 768,0 L 768,420 M 896,0 L 896,420 M 1024,0 L 1024,420 M 1152,0 L 1152,420" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Left Side: Content Card -->
  <g transform="translate(80, 50)">
    <!-- Decorative tiny vertical orange line -->
    <rect x="-24" y="24" width="4" height="230" rx="2" fill="url(#orangeGradient)" />

    <!-- Tag/Status Badge -->
    <g transform="translate(0, 20)">
      <rect width="180" height="30" rx="15" fill="#1E1E26" stroke="rgba(255,107,0,0.3)" stroke-width="1" />
      <circle cx="20" cy="15" r="5" fill="#FF6B00" />
      <circle cx="20" cy="15" r="8" fill="transparent" stroke="#FF6B00" stroke-width="1.5" opacity="0.6">
        <animate attributeName="r" values="5;10;5" dur="3s" repeatCount="indefinite" />
      </circle>
      <text x="36" y="20" fill="#FFFFFF" font-size="11" font-weight="700" letter-spacing="1">AVAILABLE FOR ROLE</text>
    </g>

    <!-- Headline (Name) -->
    <text x="0" y="110" fill="#FFFFFF" font-size="44" font-weight="800" letter-spacing="-1">Byreddy Venkata Sandeep Reddy</text>
    
    <!-- Title -->
    <text x="0" y="155" fill="url(#orangeGradient)" font-size="24" font-weight="700" letter-spacing="2">FULL STACK ENGINEER</text>

    <!-- Bio Statement -->
    <text x="0" y="200" fill="#A0A0B0" font-size="16" font-weight="400" width="550" style="line-height: 1.5;">
      <tspan x="0" dy="0">I build high-performance SaaS products, AI-powered applications,</tspan>
      <tspan x="0" dy="24">scalable web platforms, and business solutions with elegant code.</tspan>
    </text>

    <!-- Decorative Tiny Spec badges -->
    <g transform="translate(0, 265)" opacity="0.95">
      <!-- Badge 1 -->
      <g transform="translate(0, 0)">
        <rect width="110" height="28" rx="6" fill="#14141A" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
        <text x="55" y="18" fill="#F1F1F3" font-size="12" font-weight="600" text-anchor="middle">⚡ High Speed</text>
      </g>
      <!-- Badge 2 -->
      <g transform="translate(125, 0)">
        <rect width="110" height="28" rx="6" fill="#14141A" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
        <text x="55" y="18" fill="#F1F1F3" font-size="12" font-weight="600" text-anchor="middle">🧠 AI-Ready</text>
      </g>
      <!-- Badge 3 -->
      <g transform="translate(250, 0)">
        <rect width="110" height="28" rx="6" fill="#14141A" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
        <text x="55" y="18" fill="#F1F1F3" font-size="12" font-weight="600" text-anchor="middle">💼 SaaS Focus</text>
      </g>
    </g>
  </g>

  <!-- Right Side: Apple Macbook & Coding Mockup -->
  <g transform="translate(730, 45)" filter="url(#shadow)">
    <!-- 1. Macbook Screen Outer Frame -->
    <rect x="50" y="20" width="410" height="265" rx="16" fill="#08080A" stroke="#25252D" stroke-width="2" />
    
    <!-- 2. Macbook Screen Display Area -->
    <rect x="58" y="28" width="394" height="249" rx="10" fill="url(#laptopScreen)" />

    <!-- 3. Screen Reflections / Code Mockup -->
    <!-- Mock Code Window Header -->
    <circle cx="75" cy="45" r="5" fill="#FF5F56" />
    <circle cx="90" cy="45" r="5" fill="#FFBD2E" />
    <circle cx="105" cy="45" r="5" fill="#27C93F" />
    <text x="255" y="49" fill="#5F5F6F" font-size="11" font-weight="500" text-anchor="middle">app.ts</text>

    <!-- Mock Code Lines -->
    <g transform="translate(75, 75)" opacity="0.9">
      <!-- Line 1: const developer = { -->
      <text x="0" y="0" font-size="12" font-family="Courier, monospace" font-weight="bold">
        <tspan fill="#E94057">const</tspan> <tspan fill="#00C6FF">developer</tspan> <tspan fill="#FFFFFF">= {</tspan>
      </text>
      <!-- Line 2:   name: "Byreddy Venkata Sandeep", -->
      <text x="15" y="20" font-size="12" font-family="Courier, monospace" font-weight="bold">
        <tspan fill="#FF8A00">name:</tspan> <tspan fill="#38ef7d">"Byreddy"</tspan><tspan fill="#FFFFFF">,</tspan>
      </text>
      <!-- Line 3:   role: "Full Stack", -->
      <text x="15" y="40" font-size="12" font-family="Courier, monospace" font-weight="bold">
        <tspan fill="#FF8A00">role:</tspan> <tspan fill="#38ef7d">"Full-Stack"</tspan><tspan fill="#FFFFFF">,</tspan>
      </text>
      <!-- Line 4:   passion: ["SaaS", "AI", "Performance"], -->
      <text x="15" y="60" font-size="12" font-family="Courier, monospace" font-weight="bold">
        <tspan fill="#FF8A00">crafts:</tspan> <tspan fill="#FFFFFF">[</tspan><tspan fill="#38ef7d">"SaaS"</tspan><tspan fill="#FFFFFF">, </tspan><tspan fill="#38ef7d">"AI"</tspan><tspan fill="#FFFFFF">],</tspan>
      </text>
      <!-- Line 5:   stack: ["React", "TypeScript", "Firebase"] -->
      <text x="15" y="80" font-size="12" font-family="Courier, monospace" font-weight="bold">
        <tspan fill="#FF8A00">stack:</tspan> <tspan fill="#FFFFFF">[</tspan><tspan fill="#38ef7d">"React"</tspan><tspan fill="#FFFFFF">, </tspan><tspan fill="#38ef7d">"Node"</tspan><tspan fill="#FFFFFF">]</tspan>
      </text>
      <!-- Line 6: }; -->
      <text x="0" y="100" fill="#FFFFFF" font-size="12" font-family="Courier, monospace" font-weight="bold">};</text>

      <!-- Line 7: // Ready to ship production code -->
      <text x="0" y="130" fill="#5F5F6F" font-size="11" font-family="Courier, monospace" font-style="italic">// Ready to ship elegant code...</text>

      <!-- Large Orange Logo overlay back of screen -->
      <path d="M 230 10 L 290 10 L 260 70 Z" fill="#FF6B00" opacity="0.1" />
    </g>

    <!-- Glossy reflection on screen -->
    <path d="M 58 28 L 300 28 L 58 270 Z" fill="#FFFFFF" opacity="0.02" />

    <!-- 4. Macbook Keyboard Body Base (Apple Aluminum Space Gray) -->
    <path d="M 12 284 L 498 284 C 504 284, 508 288, 507 294 L 498 310 C 496 313, 492 315, 486 315 L 24 315 C 18 315, 14 313, 12 310 L 3 294 C 2 288, 6 284, 12 284 Z" fill="#2E2E38" stroke="#1A1A22" stroke-width="1.5" />
    <!-- Keyboard indent / notch -->
    <path d="M 215 284 L 295 284 L 290 287 L 220 287 Z" fill="#121215" />
    <!-- Opening notch -->
    <rect x="230" y="284" width="50" height="4" rx="2" fill="#0D0D11" />
  </g>

  <!-- Floating Tech Badges on Right with Glow -->
  <!-- TS -->
  <g transform="translate(710, 290)" filter="url(#shadow)">
    <circle cx="28" cy="28" r="28" fill="#14141A" stroke="#3178C6" stroke-width="1.5" />
    <rect x="15" y="15" width="26" height="26" rx="3" fill="#3178C6" />
    <text x="21" y="34" fill="#FFFFFF" font-size="15" font-weight="800" font-family="system-ui">T</text>
    <text x="31" y="34" fill="#FFFFFF" font-size="15" font-weight="800" font-family="system-ui">S</text>
  </g>

  <!-- React -->
  <g transform="translate(670, 100)" filter="url(#shadow)">
    <circle cx="28" cy="28" r="28" fill="#14141A" stroke="#61DAFB" stroke-width="1.5" />
    <ellipse cx="28" cy="28" rx="8" ry="18" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(30 28 28)" />
    <ellipse cx="28" cy="28" rx="8" ry="18" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(90 28 28)" />
    <ellipse cx="28" cy="28" rx="8" ry="18" fill="none" stroke="#61DAFB" stroke-width="1.2" transform="rotate(150 28 28)" />
    <circle cx="28" cy="28" r="3" fill="#61DAFB" />
  </g>

  <!-- Firebase -->
  <g transform="translate(1140, 70)" filter="url(#shadow)">
    <circle cx="28" cy="28" r="28" fill="#14141A" stroke="#FFCA28" stroke-width="1.5" />
    <path d="M19 38l1-2 8-15 3-5a1 1 0 011 0l3 5 1 2 1 2z" fill="#FFCA28" />
    <path d="M19 38l1-2 15-8 1-1a1 1 0 000-1l-3-6a1 1 0 00-1 0z" fill="#F57C00" />
    <path d="M19 38l17-10-1-1a1 1 0 00-1-1H19z" fill="#FFA000" opacity="0.8" />
  </g>

  <!-- Node -->
  <g transform="translate(1190, 240)" filter="url(#shadow)">
    <circle cx="28" cy="28" r="28" fill="#14141A" stroke="#339933" stroke-width="1.5" />
    <path d="M18 20l10-6 10 6v12l-10 6-10-6z" fill="none" stroke="#339933" stroke-width="2" />
    <path d="M28 14v20M18 20l10 6 10-6" fill="none" stroke="#339933" stroke-width="1.5" />
  </g>
</svg>